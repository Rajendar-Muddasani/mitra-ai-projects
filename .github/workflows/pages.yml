name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build JupyterLite
        run: |
          pip install jupyterlite-core==0.4.1 jupyterlite-pyodide-kernel==0.4.1
          mkdir -p site/lab
          jupyter lite build \
            --contents notebooks/ \
            --output-dir site/lab/ \
            --no-sourcemaps
        env:
          JUPYTERLITE_NO_SOURCEMAPS: "1"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
